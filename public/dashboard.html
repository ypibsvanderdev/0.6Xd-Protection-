<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – 0.6xd Protection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
/* ── [V3 AESTHETIC REFRESH] ── */
:root {
  --bg: #050508; --bg2: #09090f; --card: #0e0e1a; --border: #1a1a2e; --accent: #7c3aed; --text: #e2e8f0; --muted: #64748b;
  --success: #10b981; --danger: #ef4444; --sidebar: 220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; }
.sidebar { width: var(--sidebar); min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 50; }
.sb-logo { padding: 1.5rem; font-weight: 800; border-bottom: 1px solid var(--border); }
.sb-item { padding: 0.75rem 1.5rem; font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: 0.2s; }
.sb-item:hover, .sb-item.active { color: #a78bfa; background: rgba(124,58,237,0.1); }
.main { margin-left: var(--sidebar); flex: 1; padding: 2rem; min-height: 100vh; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.btn { padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; font-size: 0.85rem; }
.btn-primary { background: var(--accent); color: white; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th { text-align: left; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; padding: 0.75rem; border-bottom: 1px solid var(--border); }
td { padding: 0.75rem; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
.code-block { background: #000; border: 1px solid var(--border); padding: 1rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; overflow-x: auto; position: relative; margin-top: 1rem; }
.notif { position: fixed; bottom: 2rem; right: 2rem; background: var(--accent); padding: 1rem 1.5rem; border-radius: 8px; color: white; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 1000; }
.notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">0.6xd Protection V4</div>
  <div class="sb-item active" onclick="nav('scripts')">🔒 Scripts</div>
  <div class="sb-item" onclick="nav('keys')">🔑 Keys</div>
</aside>

<main class="main">
  <div id="page-scripts" class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h2>Your Scripts</h2>
      <button class="btn btn-primary" onclick="showPrompt()">+ Protect New</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="scripts-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="page-keys" class="page" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h2>Active Keys</h2>
      <button class="btn btn-primary" onclick="genNewKey()">+ Create Key</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Key</th><th>Script ID</th><th>Loader URL</th><th>Actions</th></tr></thead>
          <tbody id="keys-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="notif" id="notif"></div>

<script>
// ── STATE ──
let SCRIPTS = JSON.parse(localStorage.getItem('06xd-scripts') || '[]');
let KEYS = JSON.parse(localStorage.getItem('06xd-keys') || '[]');

function save() {
  localStorage.setItem('06xd-scripts', JSON.stringify(SCRIPTS));
  localStorage.setItem('06xd-keys', JSON.stringify(KEYS));
}

// ── 🛡️ AUTO-REPAIR ENGINE ──
function repair() {
    let repaired = false;
    KEYS.forEach(k => {
        if (typeof k.loader === 'string' && k.loader.includes('[object Object]')) {
            const hash = k.loaderHash || 'repaired_' + Math.random().toString(36).slice(2, 10);
            k.loader = `loadstring(game:HttpGet("${window.location.origin}/files/v4/loaders/${hash}.lua"))()`;
            repaired = true;
        }
    });
    if (repaired) { save(); console.warn("[REPAIR] Corrupted loaders fixed."); }
}
repair();

// ── UI ──
function nav(pg) {
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById('page-'+pg).style.display='block';
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  document.querySelector(`[onclick="nav('${pg}')"]`).classList.add('active');
  if(pg==='scripts') renderScripts(); if(pg==='keys') renderKeys();
}

function notify(m) { const n=document.getElementById('notif'); n.textContent=m; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),3000); }

function renderScripts() {
  const t = document.getElementById('scripts-table');
  t.innerHTML = SCRIPTS.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>Active</td><td><button class="btn btn-ghost" onclick="deleteScript('${s.id}')">Delete</button></td></tr>`).join('') || '<tr><td colspan="4">No scripts yet.</td></tr>';
}

function renderKeys() {
  const t = document.getElementById('keys-table');
  t.innerHTML = KEYS.map(k => `<tr><td style="font-family:monospace">${k.key}</td><td>${k.scriptId}</td><td style="font-size:0.7rem">${k.loader}</td><td><button class="btn btn-ghost" onclick="copy('${k.loader}')">Copy</button></td></tr>`).join('') || '<tr><td colspan="4">No keys yet.</td></tr>';
}

function copy(t) { navigator.clipboard.writeText(t); notify('✅ Copied Loader!'); }

function deleteScript(id) { SCRIPTS = SCRIPTS.filter(s=>s.id!==id); save(); renderScripts(); }

async function showPrompt() {
    const name = prompt("Script Name:", "Vander Duels"); if(!name) return;
    const source = prompt("Enter Script Source Code:"); if(!source) return;
    const id = 'sc_' + Math.random().toString(36).slice(2, 8);
    SCRIPTS.unshift({ id, name, added: Date.now() });
    save(); renderScripts(); notify('✅ Script protected local-side');
}

function genNewKey() {
    if(SCRIPTS.length === 0) return notify('🚫 Add a script first');
    const scriptId = SCRIPTS[0].id; // Just use first script for this demo
    const key = '06XD-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();
    const hash = [...crypto.getRandomValues(new Uint8Array(16))].map(b=>b.toString(16).padStart(2,'0')).join('');
    const origin = window.location.origin;
    const loader = `loadstring(game:HttpGet("${origin}/files/v4/loaders/${hash}.lua"))()`;
    KEYS.unshift({ key, scriptId, loaderHash: hash, loader, created: Date.now() });
    save(); renderKeys(); notify('✅ Key & Loader Generated!');
}

renderScripts();
</script>
</body>
</html>
