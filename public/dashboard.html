<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0.6xd Protection V4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root { --bg: #050508; --card: #0e0e1a; --border: #1a1a2e; --accent: #7c3aed; --text: #e2e8f0; --muted: #64748b; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; margin: 0; }
.sidebar { width: 220px; min-height: 100vh; background: #09090f; border-right: 1px solid var(--border); padding: 1.5rem; position: fixed; }
.main { margin-left: 220px; flex: 1; padding: 2rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.btn { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.8rem; }
.btn-primary { background: var(--accent); color: white; }
.btn-danger { background: #ef4444; color: white; }
.code { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; background: #000; padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; word-break: break-all; color: #a78bfa; }
</style>
</head>
<body>

<aside class="sidebar">
  <div style="font-weight:800;margin-bottom:2rem">0.6xd Protection V4</div>
  <div onclick="location.reload()" style="cursor:pointer;color:var(--muted);font-size:0.8rem;margin-bottom:1rem">📊 Refresh</div>
  <button class="btn btn-danger" style="width:100%;font-size:0.7rem;opacity:0.5" onclick="purge()">💀 PURGE LOCAL DATA</button>
</aside>

<main class="main">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3>Scripts</h3>
      <button class="btn btn-primary" onclick="addScript()">+ Add Script</button>
    </div>
    <div id="scripts"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3>Keys & Loaders</h3>
      <button class="btn btn-primary" onclick="addKey()">+ Create Key</button>
    </div>
    <div id="keys"></div>
  </div>
</main>

<script>
let SCRIPTS = JSON.parse(localStorage.getItem('06xd-scripts') || '[]');
let KEYS = JSON.parse(localStorage.getItem('06xd-keys') || '[]');

function save() {
    localStorage.setItem('06xd-scripts', JSON.stringify(SCRIPTS));
    localStorage.setItem('06xd-keys', JSON.stringify(KEYS));
}

function purge() {
    if(confirm("THIS WILL DELETE ALL LOCAL SCRIPTS AND KEYS. CONTINUE?")) {
        localStorage.clear(); location.reload();
    }
}

function render() {
    const sDiv = document.getElementById('scripts');
    sDiv.innerHTML = SCRIPTS.map(s => `
        <div style="padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div><span style="font-weight:700">${s.name}</span> <span style="color:var(--muted);font-size:0.7rem">(${s.id})</span></div>
            <button onclick="delScript('${s.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer">✕</button>
        </div>
    `).join('') || '<div style="color:var(--muted);padding:1rem">No scripts added.</div>';

    const kDiv = document.getElementById('keys');
    kDiv.innerHTML = KEYS.map(k => `
        <div style="padding:1rem;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
                <span style="font-family:monospace;font-weight:700">${k.key}</span>
                <button onclick="delKey('${k.key}')" style="background:none;border:none;color:#ef4444;cursor:pointer">✕</button>
            </div>
            <div class="code">${k.loader}</div>
            <button class="btn btn-primary" style="font-size:0.7rem;padding:0.3rem 0.6rem" onclick="copy('${k.loader}')">Copy Loader</button>
        </div>
    `).join('') || '<div style="color:var(--muted);padding:1rem">No keys. Create one to get a loader.</div>';
}

function addScript() {
    const name = prompt("Script Name:", "Target Script"); if(!name) return;
    const id = 'sc_' + Math.random().toString(36).slice(2, 8);
    SCRIPTS.unshift({ id, name }); save(); render();
}

function addKey() {
    if(SCRIPTS.length === 0) return alert("Add a script first!");
    const scriptId = SCRIPTS[0].id;
    const key = '06XD-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();
    const hash = [...crypto.getRandomValues(new Uint8Array(16))].map(b=>b.toString(16).padStart(2,'0')).join('');
    const origin = window.location.origin;
    const loader = `loadstring(game:HttpGet("${origin}/files/v4/loaders/${hash}.lua"))()`;
    KEYS.unshift({ key, scriptId, loaderHash: hash, loader });
    save(); render();
}

function delScript(id) { SCRIPTS = SCRIPTS.filter(s=>s.id!==id); save(); render(); }
function delKey(k) { KEYS = KEYS.filter(key=>key.key!==k); save(); render(); }
function copy(t) { navigator.clipboard.writeText(t); alert("✅ Copied to clipboard!"); }

render();
</script>
</body>
</html>
